        После списка отметьте рядом с каждым пунктом, что именно делает ситуацию сложной:
        страх обидеть, вина, давление, привычка соглашаться, страх конфликта, страх
        выглядеть плохим человеком, зависимость от мнения другого, желание сохранить
        мир любой ценой.

        Не нужно пока ничего менять. Сегодня задача — увидеть карту.

