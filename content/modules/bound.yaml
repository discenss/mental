- n: 4
  title: Сохранять контакт и не сдавать себя
  intro_screen: '👀 На предыдущих этапах вы учились замечать собственные границы, видеть
    автоматические согласия, отделять свою ответственность от чужой и распознавать
    чувства, которые быстро возвращают к старому поведению.

    🌉 Теперь начинается перенос в реальные отношения. Именно здесь часто появляется
    новая трудность: человек уже понимает тему, но в живом разговоре снова соглашается,
    начинает долго оправдываться или, наоборот, защищается резче, чем хотел.

    🪜 Поэтому мы не будем начинать с самого тяжёлого разговора вашей жизни. Вы составите
    карту ситуаций, разделите их по сложности и выберете тренировочные случаи. Затем
    подготовите короткие формулировки и попробуете удерживать позицию, даже если просьба
    повторяется.

    🕊️ Смысл недели — увидеть, что граница может быть спокойной. Сохранить контакт с
    человеком не означает отказаться от себя, а обозначить свою позицию не означает
    обязательно разрушить отношения.

    '
  meaning: '🧠 Неделя переводит внутреннее понимание в поведенческий навык. Пользователь
    учится выбирать посильную сложность, заранее формулировать границу, пробовать
    её в реальной ситуации и повторять позицию при повторной просьбе.

    🔑 Ключевой механизм недели — снижение тревожного многословия. Объяснение может быть
    частью контакта, но длинное оправдание часто становится попыткой получить разрешение
    другого человека на собственную границу.

    '
  goal: '🎯 Цель недели: научить пользователя обозначать границы коротко и спокойно в
    ситуациях посильной сложности, повторять позицию при давлении и различать уважительное
    объяснение от тревожного оправдания и сдачи своей позиции.

    '
  result: '🌿 К концу недели пользователь может иметь собственную лестницу сложности,
    3–5 рабочих формулировок, хотя бы один опыт реального действия и более ясное понимание,
    как сохранять контакт без автоматического отказа от себя.

    '
