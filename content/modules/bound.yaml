      internal_correct: Короткая, спокойная и без длинных оправданий
    reflection:
    - Какая фраза границы звучит для меня наиболее спокойно?
    - Где я заметил(а) желание начать оправдываться?
    - Какая фраза поможет мне сохранить контакт и не сдать границу?
  - d: 4
    title: Первое действие в ситуации средней сложности
    focus: '🎯 Попробовать обозначить границу в реальной ситуации, не выбирая самый тяжёлый
      разговор.


      🚶 Границы становятся устойчивее не только от размышлений, но и от маленьких действий.
      Сегодня важно выбрать ситуацию средней сложности и использовать одну из подготовленных
      фраз. Это не экзамен и не проверка силы характера. Это тренировка. Главное —
      не идеальность, а опыт: что происходит с вами до, во время и после обозначения
      границы.'
    task:
      text: 'Вы можете выполнить это задание устно или записать важные наблюдения
        в «Мой дневник». Записывать нужно не технический отчёт, а то, что действительно
        помогло вам лучше понять себя.

        '
      subtasks:
      - 'Задание 1.

        Выберите одну реальную ситуацию уровня 4–6, где можно обозначить границу.

        Используйте заранее подготовленную фразу. Не ждите идеального момента и не
        берите самый тяжёлый разговор.

        После фразы не добавляйте длинных объяснений, не отменяйте своё решение из
        чувства вины и не начинайте доказывать, что у вас есть право так ответить.

        Если нужно вернуться к разговору позже, возвращайтесь не к оправданиям, а
        к спокойному подтверждению своей позиции.

        '
      - 'Задание 2.

        После ситуации отметьте: что я ожидал(а), что произошло на самом деле, что
        я чувствовал(а) до и после, где мне удалось сохранить себя хотя бы немного.

        '
    quiz:
      kind: progress
      question: Что является главной задачей сегодняшней тренировки?
      options:
      - Обозначить границу в ситуации средней сложности и заметить свой опыт
      - Выиграть спор любой ценой
      - Сразу решить самый тяжёлый конфликт
      - Сказать так, чтобы другому человеку точно не было неприятно
      saves_free_text: false
      internal_correct: Обозначить границу в ситуации средней сложности и заметить
        свой опыт
    reflection:
    - Что произошло в реальности после моей границы?
    - Чем реальность отличалась от моих ожиданий?
    - Что я могу признать как маленький шаг в свою сторону?
  - d: 5
    title: Повторная просьба и давление
    focus: '🔁 Научиться не разрушать границу на втором круге, когда человек просит снова
      или давит мягче/сильнее.


      🧱 Многие люди могут сказать «нет» один раз, но сдаются после повторной просьбы.
      Именно повторное давление часто включает старую привычку: объяснять, оправдываться,
      смягчать, соглашаться хотя бы частично. Сегодня задача — не придумывать новую
      причину и не вступать в длинные переговоры, если ваша позиция не изменилась.'
    task:
      text: 'Вспомните или отследите ситуацию, где после вашего отказа человек просит
        снова, давит, уточняет, обижается, спорит или пытается получить согласие другим
        способом.

        Подготовьте фразу повторного отказа. Например: «Я понимаю, что тебе это важно,
        но мой ответ остаётся прежним». Или: «Я слышу тебя, но сейчас я не могу это
        взять».

        Если повторная просьба появится в реальности, используйте ту же позицию. Не
        придумывайте новые причины, не усиливайте оправдания, не меняйте ответ только
        из-за напряжения.

        Если реальной ситуации сегодня не будет, выполните задание письменно: опишите
        2–3 типичных варианта повторного давления и подготовьте для них спокойные
        повторные фразы.

        Вы можете выполнить это задание устно или записать важные наблюдения в «Мой
        дневник». Записывать нужно не технический отчёт, а то, что действительно помогло
        вам лучше понять себя.

        '
    quiz:
      kind: progress
      question: Что лучше всего помогает выдержать повторную просьбу?
      options:
      - Спокойно повторить позицию без новых оправданий
      - Быстро придумать ещё больше причин
      - Согласиться, чтобы разговор закончился
      - Ответить резко, чтобы человек испугался
      saves_free_text: false
      internal_correct: Спокойно повторить позицию без новых оправданий
    reflection:
    - Какая повторная просьба для меня самая трудная?
    - Что я обычно начинаю делать под давлением?
    - Какую фразу я хочу использовать, чтобы не сдавать границу на втором круге?
  - d: 6
    title: Объяснение без оправдания
    focus: '🤝 Научиться сохранять контакт, но не отдавать другому человеку право решать,
      достаточно ли у вас причин.


      ⚖️ В отношениях иногда действительно важно коротко объяснить свою границу. Но объяснение
      и оправдание — разные вещи. Объяснение короткое, спокойное и завершённое. Оправдание
      длинное, тревожное и будто просит разрешения. Объяснение сохраняет контакт.
      Оправдание часто отдаёт другому человеку власть решать, имеете ли вы право на
      своё решение.'
    task:
      text: 'Вы можете выполнить это задание устно или записать важные наблюдения
        в «Мой дневник». Записывать нужно не технический отчёт, а то, что действительно
        помогло вам лучше понять себя.

        '
      subtasks:
      - 'Задание 1.

        Возьмите одну из ваших тренировочных ситуаций и составьте фразу по формуле:
        граница + короткое объяснение без оправдания.

        Примеры: «Я не смогу помочь, у меня уже запланировано время для себя». «Я
        не возьму эту задачу, сейчас я перегружен(а)». «Я не готов(а) обсуждать это
        вечером, мне нужно восстановиться». «Я понимаю, что тебе нужна помощь, но
        сегодня я не могу».

        Проверьте каждую фразу по трём признакам: она короткая, в ней есть ясная граница,
        после неё не нужно добавлять ещё пять причин.

        Если фраза становится слишком длинной, сократите её до одного спокойного объяснения.

        '
      - 'Задание 2.

        Дополнительно выпишите одну ситуацию, где вы обычно оправдываетесь. Перепишите
        своё привычное оправдание в короткое объяснение.

        '
    quiz:
      kind: progress
      question: Чем объяснение отличается от оправдания?
      options:
      - Объяснение короткое и сохраняет позицию, оправдание длинное и тревожное
      - Объяснение всегда должно быть очень подробным
      - Оправдание лучше, потому что так человек точно не обидится
      - Разницы нет
      saves_free_text: false
      internal_correct: Объяснение короткое и сохраняет позицию, оправдание длинное
        и тревожное
    reflection:
    - Где я чаще всего начинаю оправдываться?
    - Как звучит моя короткая фраза объяснения без оправдания?
    - Что меняется внутри, когда я не пытаюсь заслужить разрешение на свою границу?
  - d: 7
    title: 'Итоги недели: контакт без сдачи себя'
    focus: '🏁 Собрать опыт недели и увидеть, где уже появилась большая устойчивость.


      🧩 Финальный день нужен не для нового сложного действия, а для интеграции. Вы смотрите,
      какие ситуации стали понятнее, где стало чуть легче, где напряжения всё ещё
      много, какие реакции людей оказались не такими страшными, как ожидалось, а какие
      действительно требуют большей осторожности. Главная мысль недели: можно быть
      в отношениях и при этом не исчезать из них.'
    task:
      text: '🔍 Ответьте письменно или устно на вопросы недели.

        ❓В каких ситуациях мне стало немного легче говорить «нет» или обозначать границу?

        ❓Где всё ещё много напряжения, страха, вины или привычки соглашаться?

        ❓Какие реакции людей оказались неожиданными?

        ❓Где я выдержал(а) повторную просьбу или хотя бы заметил(а), как обычно сдаю
        границу?

        ❓Что стало самым важным открытием недели?

        Сформулируйте одну фразу недели. Например: «Я могу сохранять контакт и не
        сдавать себя». Или подберите свою формулировку, которая звучит естественно.

        Вы можете выполнить это задание устно или записать важные наблюдения в «Мой
        дневник». Записывать нужно не технический отчёт, а то, что действительно помогло
        вам лучше понять себя.

        '
    quiz:
      kind: progress
      question: Что является главным итогом этой недели?
      options:
      - Учиться сохранять контакт и одновременно не отказываться от своей границы
      - Всегда отказывать всем людям
      - Избегать любых сложных разговоров
      - Доказывать другим, что они неправы
      saves_free_text: false
      internal_correct: Учиться сохранять контакт и одновременно не отказываться от
        своей границы
    reflection:
