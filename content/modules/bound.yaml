weeks:
- n: 1
  title: Увидеть, где я теряю свои границы
  intro_screen: '👀 На этой неделе вы не будете учиться резко отказывать, спорить или
    доказывать другим людям, что с вами нужно считаться. Сначала мы будем делать другое
    — замечать.


    ⚡ Очень часто граница теряется раньше, чем человек произносит «да». Сначала появляется
    короткое внутреннее «не хочу», усталость, напряжение или раздражение. Затем включается
    привычная мысль: «ладно», «так будет проще», «не хочу обидеть», «я сам справлюсь».
    И только потом человек обнаруживает, что снова согласился против себя.


    🔍 Поэтому первая неделя — наблюдательная. Вы будете смотреть, в каких ситуациях
    границы исчезают быстрее, с какими людьми это происходит, какие роли включаются
    и какую цену вы платите за автоматическое согласие.


    🗺️ К концу недели важно не стать мастером отказа. Достаточно начать раньше узнавать
    собственный сценарий и собрать первую карту своих границ.

    '
  meaning: '🧭 Первая неделя переводит тему границ из общего ощущения «мной пользуются»
    в конкретные наблюдения. Пользователь исследует не только поведение других людей,
    но и собственную последовательность: сигнал → автоматическая мысль → согласие
    или терпение → последствия.


    🎯 Главная задача — повысить чувствительность к раннему моменту потери границы. Пока
    человек замечает проблему только на стадии сильной злости или истощения, ему трудно
    сделать другой выбор.

    '
  goal: '🎯 Цель недели: помочь пользователю распознавать собственные сигналы «не хочу
    / не подходит / слишком много», увидеть повторяющиеся ситуации и роли потери границ
    и связать автоматическое согласие с его эмоциональной и ресурсной ценой.

    '
  result: '🌿 К концу недели пользователь может лучше назвать свои ранние сигналы, 3–5
    типичных ситуаций или людей, повторяющийся сценарий и хотя бы один момент, где
    пауза перед ответом могла бы изменить привычную реакцию.

    '
  key_themes:
  - автоматическое согласие
  - внутреннее «не хочу»
  - цена отсутствия границ
  - повторяющийся сценарий
  - сложные люди и роли
  - раздражение как сигнал
  days:
  - d: 1
    title: Автоматическое согласие
    focus: '👀 Сегодня важно начать замечать моменты, когда вы соглашаетесь быстрее,
      чем успеваете подумать.


      ⚡ Автоматическое согласие часто выглядит незаметно. Человек ещё не понял, хочет
      ли он, может ли он, удобно ли ему, есть ли у него силы, но уже сказал: «да»,
      «хорошо», «сделаю», «ладно», «не вопрос».


      🎯 Сегодня не нужно сразу отказывать. Задача проще: заметить, где согласие происходит
      раньше, чем появляется внутренний выбор.

      '
    task:
      text: 'В течение дня обращайте внимание на ситуации, где вы:

        🔸 соглашаетесь на просьбы;

        🔸 берёте на себя дополнительные задачи;

        🔸 говорите «да», хотя внутри есть напряжение;

        🔸 отвечаете быстрее, чем успеваете подумать;

        🔸 чувствуете, что согласились не из желания, а из привычки.

        🔍 Вечером выберите несколько таких эпизодов и ответьте на вопросы:

        🔸 что произошло;

        🔸 чего вы хотели на самом деле;

        🔸 почему согласились;

        🔸 что почувствовали после согласия;

        🔸 что можно было бы заметить раньше.

        '
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам сегодня заметить хотя бы один момент автоматического
        согласия?
      options:
      - да, заметил / заметила чётко
      - да, заметил / заметила частично
      - понял / поняла это только вечером
      - пока сложно замечать
      - я не выполнял / не выполняла задание
      correct: null
      saves_free_text: false
    reflection:
    - В какой ситуации я сегодня согласился / согласилась быстрее, чем хотел / хотела?
    - Что я на самом деле хотел / хотела в этот момент?
    - Что я могу сказать себе без критики?
  - d: 2
    title: Цена отсутствия границ
    focus: '🔎 Сегодня важно увидеть, что отсутствие границ имеет реальную цену.


      📉 Когда человек часто уступает, терпит, берёт лишнее или соглашается против себя,
      последствия могут быть не сразу заметны. Но постепенно они проявляются в усталости,
      раздражении, обиде, потере времени, перегрузе, снижении желания общаться и ощущении,
      что собственная жизнь отодвигается на второй план.


      🧭 Сегодня задача — не обвинять себя и не обвинять других. Важно спокойно увидеть:
      ❓что я теряю, когда не учитываю свои границы?

      '
    task:
      text: 'Опишите для себя, как отсутствие границ влияет на разные сферы жизни:

        💼 работа и дела;

        💞 отношения;

        🌴 отдых и время для себя;

        💭 эмоциональное состояние;

        🛌 тело и усталость;

        🎛️ ощущение контроля над своей жизнью.

        🔍 Ответьте на вопросы:

        🔸 где я перегружен / перегружена;

        🔸 где чаще всего раздражаюсь;

        🔸 где чувствую усталость или обиду;

        🔸 где слишком часто выбираю не себя;

        🔸 какая цена повторяется чаще всего.

        '
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам сегодня увидеть цену отсутствия границ?
      options:
      - да, стало понятнее
      - да, частично
      - появились первые наблюдения
      - пока сложно сформулировать
      - я не выполнял / не выполняла задание
      correct: null
      saves_free_text: false
    reflection:
    - Где отсутствие границ сегодня или в последнее время забирает у меня больше всего
      сил?
    - Какую цену я плачу за привычку уступать или терпеть?
    - Что я начинаю понимать о своих потребностях?
  - d: 3
    title: Повторяющийся сценарий
    focus: '🔁 Сегодня вы будете смотреть не на отдельную ситуацию, а на повторяющийся
      сценарий.


      ⛓️ У многих людей с нарушенными границами есть похожая цепочка: просьба или ожидание
      другого человека → внутреннее напряжение → мысль «надо согласиться» → согласие
      против себя → усталость, раздражение или вина.


      🌱 Когда человек видит эту цепочку, у него появляется возможность постепенно менять
      не всю жизнь сразу, а один маленький участок сценария.

      '
    task:
      text: 'Вспомните 2–3 ситуации, когда вы недавно согласились против желания,
        и разберите каждую по схеме:

        🔸 какая была просьба или ситуация;

        🔸 что вы почувствовали сразу;

        🔸 о чём подумали;

        🔸 почему согласились;

        🔸 что почувствовали позже;

        🔸 что хотели бы сделать иначе в следующий раз.

        🔍 После разбора ответьте:

        🔸 какая часть сценария повторяется чаще всего;

        🔸 на каком этапе вы теряете контакт с собой;

        🔸 что можно будет заметить раньше в следующий раз.

        '
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам сегодня увидеть свой повторяющийся сценарий?
      options:
      - да, чётко увидел / увидела
      - да, частично
      - есть первые наблюдения
      - пока сложно увидеть связь
      - я не выполнял / не выполняла задание
      correct: null
      saves_free_text: false
    reflection:
    - Какая цепочка поведения сегодня или недавно повторялась у меня?
    - На каком этапе я чаще всего теряю контакт с собой?
    - Что я могу заметить раньше в следующий раз?
  - d: 4
    title: Где границы нарушаются чаще всего
    focus: '🗺️ Сегодня вы составите карту сфер, где ваши границы чаще всего становятся
      уязвимыми.


      🔎 Иногда человеку кажется, что ему трудно с границами вообще. Но если присмотреться,
      проблема может быть сильнее выражена в определённых местах: в семье, на работе,
      в партнёрстве, в дружбе, в переписках, в просьбах о помощи.


      🧭 Когда появляется карта, становится понятнее, с чего начинать. Не нужно менять
      всё сразу. Важно увидеть, где границы теряются чаще всего.

      '
    task:
      text: 'Разделите свою жизнь на несколько зон:

        💼 работа / дела;

        👨‍👩‍👧 семья;

        💞 партнёр;

        👥 друзья и окружение;

        💬 переписки и онлайн-общение;

        🤝 помощь другим;

        🪞 отношение к себе.

        🔍 В каждой зоне ответьте:

        🔸 где меня чаще просят больше, чем я хочу;

        🔸 где мне сложнее всего отказать;

        🔸 с кем я чаще чувствую вину;

        🔸 где я чаще терплю или молчу;

        🔸 где я чаще всего устаю после общения.

        В конце выберите 1–2 самые уязвимые зоны, с которых потом будет проще начинать
        работу.

        '
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам сегодня увидеть сферу, где границы нарушаются чаще
        всего?
      options:
      - да, чётко увидел / увидела
      - да, примерно понял / поняла
      - есть несколько сфер
      - пока сложно определить
      - я не выполнял / не выполняла задание
      correct: null
      saves_free_text: false
    reflection:
    - В какой сфере мои границы чаще всего становятся уязвимыми?
    - С какими людьми мне труднее всего учитывать себя?
    - Что я понял / поняла о своей карте границ?
  - d: 5
    title: Роли, в которых я теряю себя
    focus: '🎭 Сегодня вы будете исследовать роли, которые помогают оставаться нужным,
      хорошим, удобным или безопасным для других, но часто мешают сохранять свои границы.


      💡 Такие роли могли когда-то помогать. Например, роль спасателя помогала чувствовать
      себя важным. Роль миротворца помогала избегать конфликтов. Роль удобного человека
      помогала получать одобрение. Роль того, кто терпит, помогала сохранять отношения.


      ⚠️ Проблема не в том, что эти роли «плохие». Проблема в том, что человек может
      застрять в них и перестать выбирать свободно.

      '
    task:
      text: 'Отметьте, какие роли вам знакомы:

        🦸 спасатель;

        🙂 удобный человек;

        🪨 «на меня всегда можно положиться»;

        🕊️ миротворец;

        🤐 тот, кто не создаёт проблем;

        ⏳ тот, кто терпит;

        👂 тот, кто всегда понимает других;

        🙅 тот, кто не просит для себя.

        🔍 Выберите 2–3 роли и ответьте по каждой:

        🔸 когда эта роль появилась;

        🔸 как она помогала раньше;

        🔸 как она помогает сейчас;

        🔸 как она вредит сейчас;

        🔸 что я боюсь потерять, если выйду из этой роли;

        🔸 какой маленький признак свободы я могу себе разрешить.

        '
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам сегодня заметить роль, в которой вы чаще всего теряете
        границы?
      options:
      - да, чётко заметил / заметила
      - да, частично
      - есть несколько ролей
      - пока сложно определить
      - я не выполнял / не выполняла задание
      correct: null
      saves_free_text: false
    reflection:
    - Какая роль сегодня или в жизни чаще всего заставляет меня уступать?
    - Как эта роль когда-то помогала мне?
    - Как она сейчас ограничивает меня?
  - d: 6
    title: Раздражение как сигнал границ
    focus: '😠 Сегодня важно начать замечать раздражение не как «плохую» эмоцию, а как
      возможный сигнал границ.


      🤫 Часто раздражение появляется там, где человек уже давно сказал себе внутреннее
      «нет», но внешне продолжает соглашаться, терпеть, помогать, молчать или делать
      вид, что всё нормально.


      💭 Раздражение не обязательно означает, что другой человек плохой. Иногда оно означает:
      «я слишком долго не учитывал себя».


      🔗 Сегодня задача — заметить связь между подавлением себя и накоплением злости,
      напряжения или внутреннего протеста.

      '
    task:
      text: 'В течение дня отслеживайте моменты, когда появляется раздражение, напряжение
        или внутренний протест в общении.

        🔍 По каждому заметному эпизоду ответьте:

        🔸 что меня раздражало;

        🔸 что я хотел / хотела сказать или сделать;

        🔸 что я сделал / сделала вместо этого;

        🔸 где я подавил / подавила своё «нет»;

        🔸 какая граница могла быть нарушена;

        🔸 что это раздражение пытается мне показать.

        '
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам сегодня заметить раздражение как сигнал границ?
      options:
      - да, заметил / заметила связь
      - да, частично
      - понял / поняла это только вечером
      - пока сложно видеть связь
      - я не выполнял / не выполняла задание
      correct: null
      saves_free_text: false
    reflection:
    - Где сегодня появилось раздражение или напряжение?
    - Какое моё «нет» могло быть подавлено?
    - Что я могу признать о своих границах без обвинения себя?
  - d: 7
    title: 'Итог недели: моя первая карта границ'
    focus: '🏁 Сегодня вы подводите итог недели.


      🌱 Задача была не в том, чтобы научиться идеально отказывать или сразу изменить
      отношения. Задача была мягче и глубже: начать видеть, где вы теряете границы.


      ✅ Если вы заметили автоматическое согласие, цену отсутствия границ, повторяющийся
      сценарий, уязвимую сферу, привычную роль или раздражение как сигнал — это уже
      важный результат.


      🧩 Осознание не решает всё сразу, но создаёт основу для следующего шага.

      '
    task:
      text: '🔍 Соберите первую карту своих границ. Ответьте:

        🔸 что стало самым неожиданным открытием недели;

        🔸 где мои границы нарушаются чаще всего;

        🔸 в каких ситуациях труднее всего отказать;

        🔸 какую цену я плачу за отсутствие границ;

        🔸 какая роль чаще всего заставляет меня уступать;

        🔸 как раздражение связано с моими границами;

        🔸 что я начинаю понимать о себе.

        В конце сформулируйте один итоговый вывод недели. Это может быть короткая
        фраза, например: «Я начинаю видеть, где соглашаюсь против себя» или «Моё раздражение
        часто показывает подавленное “нет”».

        '
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам подвести итог недели и увидеть свою первую карту границ?
      options:
      - да, я сделал / сделала выводы
      - частично
      - есть несколько важных наблюдений
      - пока сложно сформулировать
      - я не проходил / не проходила неделю регулярно
      correct: null
      saves_free_text: false
    reflection:
    - Какой главный вывод я делаю после этой недели?
    - Где я теперь лучше вижу свои границы?
    - С каким пониманием я перехожу к следующей неделе?
  intent_questions: []
