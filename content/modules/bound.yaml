  zones:
  - zone: GREEN
    min: 17
    max: 21
    sys_action: open_next_week
    meaning: 'Пользователь уже начал раньше распознавать момент потери границы. По
      ответам видно, что автоматическое согласие становится заметнее, появились наблюдения
      о собственном «не хочу», цене уступки и повторяющихся ситуациях.

      '
    user_text: 'Вы хорошо прошли первый этап. Главный результат этой недели — вы начали
      замечать границу раньше, чем последствия становятся единственным сигналом. Возможно,
      вы ещё не всегда успеваете остановиться, но уже лучше видите, где включается
      автоматическое согласие, с кем это происходит и что вы чувствуете после. Это
