passport:
  name: Личные границы
  intro: 'Иногда человек хорошо понимает других людей, быстро замечает их настроение,
    старается не обидеть, поддерживает, помогает и берёт на себя многое. Со стороны
    это может выглядеть как надёжность, доброта и ответственность. Но внутри постепенно
    появляется ощущение, что собственные желания, усталость и ограничения всё чаще
    остаются на втором плане.


    Человек может заранее знать, что не хочет соглашаться, но всё равно говорит «да».
    Может чувствовать раздражение после просьбы, а потом обвинять себя за это раздражение.
    Может долго объяснять отказ, отменять своё решение после чужого недовольства или
    считать, что обязан исправить настроение другого человека.


    Границы — это не холодность, не эгоизм и не борьба за власть. Это способность
    замечать, что со мной происходит, понимать свою зону ответственности, учитывать
    свои силы и потребности, обозначать позицию и оставаться в контакте с собой даже
    тогда, когда другой человек реагирует неидеально.


    Этот модуль создан не для того, чтобы научить человека резко отказывать всем подряд.
    Его задача — шаг за шагом восстановить внутреннюю опору: раньше замечать собственное
    «да» и «нет», понимать цену автоматического согласия, отделять свою ответственность
    от чужой, выдерживать чувства рядом с границами и переносить новый способ поведения
    в реальные отношения.

    '
  for_whom:
  - вы часто соглашаетесь раньше, чем успеваете понять, чего хотите сами
  - вам трудно говорить «нет», особенно близким, родным, коллегам или значимым людям
  - после отказа быстро появляется вина, стыд или тревога
  - вы боитесь обидеть, разочаровать или вызвать недовольство другого человека
  - вам кажется, что вы отвечаете за настроение и чувства окружающих
  - вы часто живёте из «я должен», «я обязан», «иначе я плохой человек»
  - вы берёте лишние задачи, просьбы или ответственность, а потом чувствуете усталость
    и раздражение
  - вы долго терпите, а затем реагируете резко или эмоционально
  - вам проще объясняться и оправдываться, чем коротко обозначить свою позицию
  - чужое недовольство заставляет вас пересматривать даже обоснованное решение
  - в близких отношениях вы часто отказываетесь от себя ради сохранения контакта
  - вы понимаете тему границ «головой», но в реальной ситуации снова повторяете старый
    сценарий
  - вы хотите научиться сохранять отношения, не превращая близость в постоянный отказ
    от себя
  extra_support: 'Если тема границ связана с выраженным страхом конкретного человека,
    продолжающимся насилием, угрозами, принуждением, тяжёлой зависимостью, выраженной
    дезорганизацией или состоянием, при котором самостоятельная работа резко ухудшает
    самочувствие, модуль лучше использовать только как дополнительный поддерживающий
    инструмент.


    В таких ситуациях важно не превращать практику границ в требование «просто научиться
    говорить нет». Реальная безопасность и индивидуальная оценка ситуации имеют приоритет.
    При необходимости лучше работать с психологом, психотерапевтом, врачом или профильной
    службой поддержки.


    Если отдельное задание вызывает сильное напряжение, пользователь может выполнить
    его коротко, выбрать более лёгкую ситуацию, сделать паузу или вернуться позже.
    Модуль не требует начинать тренировку с самых сложных отношений.

    '
  what_happens: 'На протяжении шести недель вы будете постепенно переходить от наблюдения
    к действию. Сначала важно увидеть, где именно границы теряются. Затем — понять
    внутренние правила и чувства, которые поддерживают старый сценарий. Только после
    этого начинается практика спокойных формулировок, повторной границы, выдерживания
    чужой реакции и переноса навыка в повседневную жизнь.


    от автоматического «да» — к более раннему распознаванию собственного «не хочу»

    от привычки брать всё на себя — к разделению своей и чужой ответственности

    от вины, страха и стыда как команды уступить — к способности выдерживать чувство
    и сохранять выбор

    от длинных оправданий — к короткой и спокойной формулировке

    от страха испортить контакт — к опыту сохранять отношения, не сдавая себя

    от отдельной практики — к личному стилю жизни с границами

    '
  why: 'Когда человек долго игнорирует свои ограничения, проблема редко остаётся только
    в слове «нет». Постепенно накапливаются перегрузка, раздражение, скрытая обида,
    ощущение использования, эмоциональное отдаление и злость на себя. Иногда человек
    начинает считать других людей причиной своего состояния, хотя важная часть механизма
    происходит раньше — в момент, когда собственный сигнал уже был, но не был замечен
    или признан.


    Работа с границами нужна не для усиления конфликта. Наоборот, ясная граница часто
    уменьшает количество скрытого напряжения. Человек раньше замечает предел, сообщает
    о нём до накопления злости, меньше обещает против себя и реже вынужден резко защищаться
    после длительного терпения.


    Здоровая граница не гарантирует, что другой человек всегда будет доволен. Она
    помогает различать две вещи: «другому может не понравиться мой выбор» и «я сделал
    что-то неправильное». Это различие возвращает человеку возможность принимать решения
    не только из страха реакции окружающих.

    '
  what_user_gets:
  - в каких ситуациях, отношениях и ролях он чаще всего теряет границы
  - как тело, эмоции и внутренние фразы заранее сигнализируют о собственном «нет»
  - какую цену он платит за автоматическое согласие
  - где заканчивается его ответственность и начинается выбор другого человека
  - как отличать реальную вину от вины за сам факт выбора себя
  - какие чувства чаще всего заставляют отменять границу
  - как брать паузу перед ответом и не соглашаться автоматически
  - как формулировать границу коротко, спокойно и без чрезмерных оправданий
  - как повторять позицию при повторной просьбе или давлении
  - как поддерживать себя после сложного разговора и не бросаться немедленно всё исправлять
  - как переносить навык в близкие и эмоционально значимые отношения
  - как собирать собственный личный протокол границ для дальнейшей жизни
  main_result: 'Главный результат модуля — не умение всегда отказывать и не отсутствие
    чувства вины. Главный результат — больше пространства между внутренним сигналом
    и автоматической уступкой. Человек начинает раньше замечать себя, яснее понимать
    свой выбор и постепенно удерживать позицию даже рядом с чужой реакцией.

    '
  important: 'В этом модуле не нужно резко менять все отношения, начинать с самых
    конфликтных ситуаций или доказывать окружающим, что теперь у вас есть границы.
    Навык формируется постепенно. Иногда первый реальный шаг — не отказ, а пауза перед
    ответом.


    Здесь не требуется стать жёстче. Задача — стать яснее для себя. Человек учится
    учитывать собственные силы, чувства и решения так же серьёзно, как раньше учитывал
    других.

    '
