- n: 3
  title: Выдержать вину, страх и злость
  intro_screen: '👀 Вы уже начали видеть, где теряете границы, и лучше различать свою
    и чужую ответственность. Но одного понимания часто недостаточно.

    🌊 Человек может совершенно ясно знать: «я не обязан соглашаться» — и всё равно уступить,
    потому что внутри поднялась вина. Может подготовить спокойную фразу — и промолчать
    из страха. Может долго подавлять раздражение, а затем резко защищаться, потому
    что напряжение стало слишком сильным.

    🤲 На этой неделе мы будем работать не против чувств, а с ними. Вина, стыд, страх
    и гнев не нужно запрещать. Важно научиться узнавать их и не воспринимать каждое
    сильное чувство как обязательную команду к действию.

    🌱 К концу недели задача не в том, чтобы ничего неприятного не чувствовать. Важнее
    создать небольшое пространство: «я замечаю чувство — и у меня всё ещё остаётся
    выбор».

    '
  meaning: '🧠 Неделя работает с эмоциональными барьерами к границе. Пользователь исследует,
    какое чувство чаще всего отменяет его позицию: вина, стыд, страх последствий,
    тревога или накопленный гнев.

    🔍 Особое внимание уделяется различию между чувством и фактом. Наличие вины не всегда
    означает реальное нарушение; страх не всегда означает реальную угрозу; раздражение
    иногда является ранним сигналом перегрузки или многократно проигнорированной границы.

    '
  goal: '🎯 Цель недели: помочь пользователю распознавать ключевые чувства рядом с границами,
    отличать эмоциональную реакцию от объективной оценки ситуации и тренировать паузу
    между чувством и автоматической уступкой или резкой защитой.

    '
  result: '🌿 К концу недели пользователь может лучше назвать свой главный эмоциональный
    барьер, замечать его в теле и мыслях и использовать короткую паузу, чтобы не отменять
    границу только из-за возникшего дискомфорта.

    '
