      ругать. Важно собрать карту будущей работы.'
    task:
      text: 'Составьте список минимум из 10 ситуаций, людей или типов просьб, где
        вам трудно сохранять границы.

        Можно включить туда просьбы родителей, дополнительные задачи на работе, помощь
