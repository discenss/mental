final_product:
  title: Мой личный протокол границ
  sections:
  - '1. Как я понимаю, что моя граница начинает нарушаться

    Мои ранние телесные, эмоциональные и поведенческие сигналы.

    '
  - '2. Где я чаще всего теряю себя

    Люди, ситуации и роли, в которых старый сценарий включается быстрее.

    '
  - '3. Какие чувства чаще всего отменяли мою границу

    Вина, страх, стыд, злость, тревога, напряжение или другое.

    '
  - '4. Что я обычно говорил себе

    Мои старые автоматические фразы: «я должен», «проще согласиться», «он обидится»,
    «я плохой», «не стоит конфликтовать» и другие.

    '
  - '5. Моя пауза перед ответом

    Что я делаю до ответа, чтобы услышать своё «да» или «нет».

    '
  - '6. Мои рабочие формулировки границ

    Три–пять коротких фраз, которыми я могу спокойно обозначить позицию.

    '
  - '7. Что я делаю, если на меня давят

    Мой алгоритм повторной границы без длинного оправдания.

    '
  - '8. Как я поддерживаю себя после сложной ситуации

    Что помогает мне не отменять границу из-за вины, страха или чужого недовольства.

    '
  - '9. Что для меня теперь означают здоровые границы

    Моя личная итоговая формулировка.

    '
postmodule:
  kind: flags
  rule: 'После одной недели показывать не более двух смежных фокусов.

    Единичный ответ не должен автоматически формировать смежный фокус.

    Флаг с весом 2 за одну неделю сохраняется как «сигнал», но пользователю отдельно
    не показывается автоматически.

    Смежный фокус можно показать, если: а) один и тот же тег набрал вес 2 минимум
    в двух недельных самопроверках; или б) накопленный вес тега достиг 4 и выше.

    Если одновременно выражены 3 и более тегов, показать только два с наибольшим накопленным
    весом. При равенстве — приоритет тегу, который повторился в большем количестве
    недель.

    Формулировка смежного фокуса: наблюдение и подсказка, а не рекомендация немедленно
    менять маршрут.

    Финальная интерпретация смежных фокусов: использовать только накопленные flags
    недель 1–5. Максимум два фокуса.

    Не делать автоматический переход и не писать «вам нужен другой модуль».

    Формат: «В ваших ответах на протяжении маршрута несколько раз повторялась тема…
    Это может влиять на устойчивость границ. Mental Club учитывает этот паттерн как
    дополнительный фокус».

    '
  tags:
  - ANX
  - SELF
  - REL
  - EMO
  - BURN
  - PROC
  adjacent_focus_texts:
    ANX: 'В ваших ответах несколько раз повторялась тема тревоги и ожидания тяжёлых
      последствий после отказа или сложного разговора. Возможно, именно не сама граница,
      а прогноз реакции другого человека сильнее всего возвращает вас к уступке.

      '
    SELF: 'В ответах повторялась тема внутреннего права на себя. Похоже, иногда трудность
      не только в том, как обозначить границу, а в том, насколько вы разрешаете себе
      иметь желания, ограничения и собственную позицию.

      '
    REL: 'Наиболее уязвимыми границы остаются в близких и эмоционально значимых отношениях.
      Возможно, страх потерять контакт или изменить привычную динамику отношений сильнее
      влияет на ваши решения.

      '
    EMO: 'В ответах повторялась тема сильных чувств после границы. Вина, стыд, тревога,
