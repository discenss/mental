- n: 6
  title: Сделать границы частью своей жизни
  intro_screen: '🛤️ За предыдущие недели вы прошли путь от наблюдения автоматического
    «да» до реальных попыток сохранять позицию в сложных отношениях. Вы учились замечать
    свою ответственность, распознавать вину и страх, брать паузу, подбирать слова
    и выдерживать чужую реакцию.

    🔗 На финальном этапе мы не будем вводить ещё одну сложную технику. Задача этой недели
    — соединить уже знакомые навыки в обычную жизнь.

    🌱 Границы становятся устойчивее не тогда, когда человек однажды провёл идеальный
    разговор. Они становятся частью личности через повторяющиеся маленькие выборы:
    заметить усталость, не ответить автоматически, попросить время, сказать короткое
    «нет», не отменить решение только из-за дискомфорта, заметить, что многие люди
    способны спокойно принять вашу позицию.

    🧭 Эту неделю вы будете проживать из позиции человека, который учитывает себя. Не
    идеального, не бесчувственного и не всегда уверенного. Просто человека, для которого
