    - частично чувствую
    - скорее потерян/потеряна
    - почти не чувствую
  - idx: 5
    question: Какой маленький шаг сегодня может вернуть мне ощущение жизни?
    options:
    - сделать что-то важное
    - сделать что-то приятное
    - завершить маленькое дело
    - прислушаться к себе
