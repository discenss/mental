module:
  code: REAL
  name: Найти себя и вернуть смысл
  subtitle: Когда жизнь ощущается как пауза
  content_version: 1.0.0
  final_product_kind: orientation
  postmodule_kind: test
passport:
  name: Найти себя и вернуть смысл
  intro: 'Иногда человек внешне продолжает жить обычной жизнью: работает, общается,
    выполняет обязанности, принимает решения, заботится о других. Но внутри появляется
    ощущение, что что-то важное остановилось.

    Будто жизнь продолжается, но не совсем твоя. Будто раньше были цели, желания,
    интерес, движение, а теперь всё стало размытым. Будто ты знаешь, что нужно что-то
    менять, но не понимаешь, куда идти и с чего начать.

    Этот модуль создан для тех, кто чувствует внутренний застой, потерю направления,
    снижение мотивации, ощущение нереализованности или экзистенциального тупика. Не
    обязательно находиться в остром кризисе. Иногда это состояние выглядит тихо: человек
    просто перестаёт хотеть, мечтать, планировать и чувствовать вкус будущего.

    Здесь мы не будем требовать от тебя срочно найти "великое предназначение", резко
    изменить жизнь или принять судьбоносное решение. Наоборот, путь будет мягким и
    постепенным.

    Цель этого модуля — помочь тебе снова услышать себя, понять, что с тобой происходит,
    вернуть контакт со своими желаниями, ценностями, внутренними опорами и постепенно
    собрать образ жизни, в которой снова появляется смысл.

    '
  for_whom:
  - ощущение, что живёшь не свою жизнь
  - потерю направления и целей
  - чувство, что жизнь как будто стоит на паузе
  - страх изменений
  - откладывание важных решений
  - ощущение внутреннего застоя
  - чувство нереализованного потенциала
  - трудность выбрать свой путь
  - страх ответственности за свою жизнь
  - ощущение, что время уходит
  - потерю интереса к будущему
  - ощущение бессмысленности происходящего
  - вопрос "зачем вообще всё это?"
  - апатию или безразличие к будущему
  - ощущение пустоты внутри
  - чувство, что жизнь проходит мимо
  - отсутствие образа желаемой жизни
  - трудность хотеть, мечтать и планировать
  - ощущение, что прежние цели потеряли смысл
  - чувство экзистенциального тупика
  extra_support: ''
  what_happens: 'На протяжении шести недель ты будешь постепенно исследовать не только
    то, что "не так", но и то, что ещё живо внутри тебя.

    от состояния внутренней паузы — к возвращению контакта с собой

    от растерянности — к пониманию своих ценностей

    от ощущения пустоты — к маленьким признакам желания

    от страха выбора — к более ясному направлению

    от жизни по инерции — к более осознанному отношению к своей жизни

    '
  why: 'Когда человек долго живёт без внутреннего направления, он часто начинает думать,
    что с ним "что-то не так". Но во многих случаях это не поломка. Это сигнал.

    что прежние смыслы могли устареть

    что старые цели больше не вдохновляют

    что жизнь, построенная на ожиданиях, долге или автоматизме, перестала давать чувство
    внутреннего согласия

    что внутри давно есть вопрос, на который не было времени ответить: "А чего я на
    самом деле хочу дальше?"

    Этот модуль помогает не убегать от этого вопроса, но и не проваливаться в него.
    Он даёт структуру, в которой можно спокойно, шаг за шагом, разобраться с собой.

    '
  what_user_gets:
  - почему появилось ощущение паузы, пустоты или потери смысла
  - какие цели и желания действительно его, а какие были навязаны обстоятельствами,
    ожиданиями или прошлым опытом
  - что сейчас забирает энергию и мешает двигаться
  - какие ценности остаются живыми
  - какие страхи стоят за откладыванием решений
  - какие маленькие шаги могут вернуть ощущение движения
  - как отличать настоящую потребность от давления "надо"
  - как постепенно возвращать интерес к будущему
  - на какие внутренние опоры можно опереться
  - каким может быть следующий жизненный этап
  main_result: 'Главный результат модуля — не мгновенный ответ на вопрос "в чём смысл
    всей моей жизни". Главный результат — появление большей ясности, внутреннего контакта
    и ощущения, что жизнь снова может принадлежать тебе.

    '
  important: 'Этот модуль не требует резких перемен. Здесь не нужно сразу увольняться,
    переезжать, начинать новый проект или принимать большие решения.

    Сначала важно вернуть связь с собой.

    Иногда путь начинается не с большого шага, а с честного признания: "Я больше не
    хочу жить только по инерции". И это уже начало возвращения.

    В этом модуле человек будет не заставлять себя жить "правильно", а постепенно
    искать то, что делает его жизнь более настоящей, живой и своей.

    '
markers:
  morning:
  - idx: 1
    question: 'Как я сегодня ощущаю свою жизнь: как движение, паузу или неопределённость?'
