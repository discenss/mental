      - Да, частично
      - Есть первые наблюдения
      - Пока сложно
      - Я не выполнял задание
      correct: null
      saves_free_text: false
    reflection:
    - Как я обычно откатываюсь, когда становится лучше?
    - Что я могу не обесценивать сегодня?
    - Какой маленький шаг поможет продолжить движение?
  - d: 7
    title: 'Итог недели: мой первый вектор движения'
    focus: '🧩 Сегодня важно собрать итоги недели.
    
      🧭 Вы не должны были изменить всю жизнь. Задача была другой: вернуть маленькое движение, увидеть страх
      неудачи, заметить страх хорошего результата и понять, как можно двигаться без самосаботажа.
    
      🌟 Если вы сделали хотя бы один маленький шаг, выбрали направление, заметили своё сопротивление или увидели,
      что хороший результат тоже может пугать, — это уже важный результат.
    
      🌱 Движение не обязано быть резким. Оно может быть честным, маленьким и повторяемым.'
    task:
      text: '🔍 Ответьте для себя или сохраните в дневник:
      
        🔸 В каком направлении я хочу вернуть движение?
      
        🔸 Какой маленький шаг я сделал или выбрал?
      
        🔸 Чего я боюсь, если не получится?
      
        🔸 Что я боюсь получить, если получится?
      
        🔸 Что изменится, если у меня начнёт получаться?
      
        🔸 Как я обычно могу откатываться или саботировать движение?
      
        🔸 Какой один мягкий способ продолжать я беру в шестую неделю?
      
      
        Кнопочный вариант главного вывода:
      
        🔸 Я выбрал направление движения
      
        🔸 Я сделал маленький шаг
      
        🔸 Я увидел страх неудачи
      
        🔸 Я увидел страх хорошего результата
      
        🔸 Я понял, что могу двигаться без полной уверенности
      
        🔸 Я заметил свой способ самосаботажа
      
        🔸 Мне пока сложно, но я начал видеть, как двигаться мягче'
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам подвести итог пятой недели?
