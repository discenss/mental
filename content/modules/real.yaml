- n: 6
  title: Собрать свой новый ориентир
  intro_screen: '🏁 Вы подошли к финальной неделе модуля.
  
    🔙 За предыдущие недели вы прошли важный путь: начали замечать свою внутреннюю паузу, возвращать контакт
    с собой, искать то, что для вас ещё важно, видеть внутренние стопоры и делать маленькие шаги в сторону
    движения.
  
    🌱 На этой неделе мы не будем искать "смысл всей жизни" и не будем требовать от вас больших решений.
    Вместо этого мы соберём ваш новый ориентир на ближайший этап.
  
    🧭 Ориентир — это не жёсткий план и не обещание, что больше не будет пауз, сомнений или откатов. Это
    внутренняя точка направления: что для меня сейчас важно, что я хочу поддерживать, что может меня удерживать,
    как я могу возвращаться к себе и какие маленькие шаги помогают мне снова чувствовать жизнь.
  
    🧩 Главная задача недели — собрать всё, что вы поняли о себе за модуль, в простую и понятную личную систему.
  
    🗺️ К концу недели у вас появится свой новый ориентир: не идеальный, не окончательный, но живой. Такой,
    к которому можно возвращаться после завершения модуля.'
  meaning: '🏁 На шестой неделе пользователь собирает итоги всего модуля REAL.
  
    🧩 Главная задача — интегрировать материал предыдущих недель: понять свою внутреннюю паузу; вернуть контакт
    с собой; увидеть, что ещё важно; понять, что удерживает на месте; вернуть маленькое движение; собрать
    новый ориентир на ближайший этап.
  
    🕊️ Неделя не должна открывать новые тяжёлые темы. Её задача — не углублять кризис, а дать пользователю
    ощущение завершения, структуры и опоры. Важно не обещать пользователю "найти смысл навсегда". Корректная
    формулировка: пользователь собирает новый ориентир на ближайший этап жизни.'
  goal: '🎯 Помочь пользователю выйти из модуля не с абстрактным вдохновением, а с понятной личной картой:
    что со мной происходит, что для меня важно, что меня удерживает, как я могу возвращать движение и что
    делать, если снова наступит пауза.'
  result: '🗺️ К концу недели у пользователя появляется свой новый ориентир на ближайший этап — не идеальный
    и не окончательный, но живой, к которому можно возвращаться после модуля.'
