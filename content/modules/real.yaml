    - день прошёл автоматически
  - idx: 2
    question: Что сегодня больше всего влияло на моё состояние?
    options:
    - усталость
    - тревога
    - люди
    - дела и обязанности
    - мысли о будущем
    - отсутствие сил
    - что-то приятное
    - другое
  - idx: 3
    question: Был ли сегодня хотя бы один выбор в пользу себя?
    options:
    - да
    - частично
    - нет
    - я не заметил/не заметила
  - idx: 4
    question: Что сегодня стало чуть яснее?
    options:
    - что мне важно
    - чего я не хочу
    - что меня останавливает
    - что даёт мне силы
    - пока ничего не стало яснее
  - idx: 5
    question: С каким ощущением я завершаю день?
    options:
    - стало немного спокойнее
    - появилось чуть больше ясности
    - чувствую усталость
    - чувствую пустоту
    - чувствую сопротивление
    - просто завершаю день без оценки
