- n: 3
  title: Найти то, что ещё важно
  intro_screen: '🔙 На прошлых неделях вы начали замечать свою внутреннюю паузу и постепенно возвращать
    контакт с собой: со своими чувствами, потребностями, усталостью, желаниями, внутренним "да" и "нет".
  
    🌱 На этой неделе мы сделаем следующий шаг — начнём искать то, что для вас всё ещё важно.
  
    🔍 Когда человек находится в состоянии потери смысла, может казаться, что ничего уже не имеет значения.
    Но чаще смысл не исчезает полностью. Он может стать тише, слабее, спрятаться под усталостью, разочарованием,
    автоматизмом или перегрузом.
  
    🧭 Главная задача этой недели — не найти сразу большую цель на всю жизнь, а заметить маленькие живые
    точки: что всё ещё откликается, что не всё равно, что хочется сохранить, к чему есть хотя бы слабый
    интерес.
  
    🗺️ К концу недели у вас появится первая карта того, что для вас ещё важно. Это станет основой для дальнейшего
    движения.'
  meaning: '🌉 На третьей неделе пользователь переходит от восстановления контакта с собой к поиску живых
    смысловых опор.
  
    🔍 Главная задача — помочь пользователю заметить, что для него всё ещё имеет значение: ценности, люди,
    состояния, занятия, темы, желания, интересы, незавершённые стремления, внутренние ориентиры.
  
    🕊️ Неделя не должна заставлять пользователя формулировать "миссию жизни" или искать большое предназначение.
    В состоянии внутренней паузы это может усиливать давление. Вместо этого неделя помогает искать слабые,
    но живые сигналы: "это мне не всё равно", "это ещё важно", "это хочется сохранить", "к этому есть отклик".'
  goal: '🎯 Собрать первые смысловые опоры, чтобы человек увидел, что внутри него ещё есть живые точки,
    на которые можно опереться.'
  result: '🗺️ К концу недели у пользователя появляется первая карта того, что для него ещё важно: отклики,
