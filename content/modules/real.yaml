      - Не получилось
      - Я не проходил неделю регулярно
      correct: null
      saves_free_text: false
    reflection:
    - Какой главный вывод я делаю после пятой недели?
    - Что я понял о своём движении?
    - С каким маленьким вектором я перехожу в шестую неделю?
