- n: 4
  title: Увидеть, что удерживает на месте
  intro_screen: '🔙 На прошлых неделях вы начали замечать свою внутреннюю паузу, возвращать контакт с собой
    и находить то, что для вас ещё важно.
  
    🌱 На этой неделе мы сделаем следующий шаг — посмотрим, что удерживает вас на месте.
  
    🔍 Иногда человек уже понимает, что ему не всё равно. Он начинает слышать себя, замечает свои ценности,
    понимает, что хочет вернуть больше живого чувства в жизнь. Но движение всё равно не начинается. Как
    будто внутри есть невидимые стопоры.
  
    🚧 Это могут быть страх ошибки, усталость, разочарование, вина, стыд, привычка откладывать, ожидания
    других людей, ощущение "уже поздно", страх перемен или внутренний запрет хотеть большего.
  
    🧭 Главная задача недели — не ломать эти стопоры силой, а увидеть их. Когда становится понятно, что именно
    удерживает человека на месте, появляется возможность двигаться мягче, честнее и точнее.
  
    🗺️ К концу недели вы сможете лучше понять, какие внутренние и внешние факторы мешают вам возвращать
    движение, и где возможен первый маленький сдвиг без давления на себя.'
  meaning: '🌉 На четвёртой неделе пользователь переходит от поиска важных смысловых опор к исследованию
    препятствий, которые мешают двигаться в сторону этих опор.
  
    🚧 Главная задача — помочь пользователю увидеть, что удерживает его на месте: страхи, внутренние запреты,
    усталость, разочарование, старые убеждения, вина, стыд, ожидания других людей, привычные роли, ощущение
    поздно начинать, привычка откладывать или избегать.
  
    🕊️ Неделя не должна превращаться в жёсткое преодоление. На этом этапе важно не заставлять пользователя
    "прорываться", а помочь ему понять механизм остановки.'
  goal: '🎯 Перевести ощущение "я не двигаюсь, потому что со мной что-то не так" в более ясное понимание:
    "меня удерживают конкретные внутренние и внешние факторы, и с ними можно работать постепенно".'
  result: '🗺️ К концу недели пользователь лучше понимает, какие внутренние и внешние факторы мешают ему
    возвращать движение, и где возможен первый маленький сдвиг без давления.'
  key_themes:
  - внутренние стопоры
  - страх ошибки
  - усталость vs потеря смысла
  - внутренние запреты
  - ожидания других
  - привычка откладывать
  - карта стопоров
  days:
