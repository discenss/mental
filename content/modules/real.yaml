- n: 5
  title: Вернуть маленькое движение
  intro_screen: '🔙 На прошлой неделе вы исследовали, что удерживает вас на месте: страх ошибки, усталость,
    внутренние запреты, ожидания других людей, привычку откладывать или другие стопоры.
  
    🌱 На этой неделе мы сделаем следующий шаг — начнём возвращать маленькое движение.
  
    🔍 Когда человек долго находится во внутренней паузе, движение может казаться слишком трудным. Большие
    цели пугают, резкие решения перегружают, а требование "собраться и начать новую жизнь" часто только
    усиливает сопротивление.
  
    💭 Но иногда нас останавливает не только страх неудачи. Иногда напряжение появляется и тогда, когда мы
    представляем, что у нас действительно получится. Хороший результат тоже может пугать: он может изменить
    привычную роль, отношения, ожидания других людей, уровень ответственности и представление о себе.
  
    🌿 Поэтому на этой неделе мы будем учиться двигаться мягко. Не через рывок, не через давление, не через
    идеальный план, а через маленькие реальные шаги в сторону того, что важно.
  
    🧭 Главная идея недели: движение возвращается не через подвиг, а через честный маленький шаг. И если
    успех тоже вызывает напряжение, это не значит, что нужно останавливаться. Это значит, что к новому уровню
    можно привыкать постепенно.
  
    🗺️ К концу недели вы сможете выбрать одно важное направление, сделать несколько небольших действий,
    заметить страх неудачи и страх хорошего результата, а также понять, как двигаться дальше без самосаботажа
    и давления на себя.'
  meaning: '🌉 На пятой неделе пользователь переходит от понимания внутренних стопоров к первому мягкому
    действию.
  
    🚶 Главная задача — помочь пользователю вернуть опыт движения через маленькие, безопасные, реалистичные
    шаги. Не через рывок, не через давление, не через жёсткую дисциплину, а через короткое действие в сторону
    того, что уже было найдено как важное.
  
    💭 Дополнительный важный фокус недели — помочь пользователю заметить не только страх неудачи, но и скрытое
    напряжение перед хорошим результатом. Пользователь может бояться не только того, что "не получится",
    но и того, что "получится": придётся выйти из привычной роли, появятся новые ожидания, придётся взять
    больше ответственности, изменятся отношения, станет сложнее прятаться за старое "я не могу", придётся
    признать свои способности, появится страх быть заметным.'
  goal: '🎯 Помочь пользователю перейти от наблюдения и понимания к первому бережному действию в сторону
    себя, важного и живого, а также мягко заметить скрытый страх того, что движение действительно получится.'
  result: '🗺️ К концу недели пользователь выбирает одно важное направление, делает несколько небольших
    действий, замечает страх неудачи и страх хорошего результата и понимает, как двигаться дальше без самосаботажа.'
  key_themes:
  - маленькое движение вместо рывка
  - шаг в сторону важного
  - действие без уверенности
  - страх хорошего результата
  - что изменится, если получится
  - самосаботаж без вины
  days:
  - d: 1
    title: Маленькое движение вместо большого рывка
    focus: '🚶 Сегодня важно отказаться от идеи, что движение должно быть большим.
    
      🔍 Когда человек долго стоит на месте, ему может казаться, что нужно сразу принять большое решение, резко
      изменить жизнь, найти новую цель, начать действовать уверенно и без сомнений. Но именно такое ожидание
      часто и останавливает.
    
      🌱 Маленькое движение — это не слабость. Это способ вернуть себе опыт: "я могу сделать шаг". Даже если
      шаг небольшой, он уже нарушает ощущение полной неподвижности.
    
      🎯 Сегодня задача — выбрать не большой рывок, а маленькое движение, которое можно сделать без перегруза.'
    task:
      text: '🧭 Выберите одну сферу, где вы хотите вернуть движение.
      
        🔍 Ответьте:
      
        🔸 В какой сфере я хочу почувствовать хотя бы небольшой сдвиг?
      
        🔸 Какой большой рывок я от себя требую?
      
        🔸 Какой маленький шаг был бы мягче и реалистичнее?
      
        🔸 Что можно сделать сегодня за 5–10 минут?
      
      
        Кнопочные варианты для фиксации:
      
        🔸 Маленький шаг в сторону здоровья
      
        🔸 Маленький шаг в сторону дела / работы
      
        🔸 Маленький шаг в сторону отношений
      
        🔸 Маленький шаг в сторону отдыха
      
        🔸 Маленький шаг в сторону порядка
      
        🔸 Маленький шаг в сторону интереса
      
        🔸 Маленький шаг в сторону себя
      
        🔸 Пока сложно выбрать'
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам сегодня выбрать маленькое движение вместо большого
        рывка?
      options:
      - Да, выбрал
      - Да, частично
      - Пока только думаю
      - Не получилось
      - Я не выполнял задание
      correct: null
      saves_free_text: false
    reflection:
    - В какой сфере я хочу вернуть движение?
    - Какой маленький шаг кажется возможным?
    - Что меня удерживает от того, чтобы начать с малого?
  - d: 2
    title: Один шаг в сторону важного
    focus: '🔗 Сегодня задача — связать действие с тем, что для вас важно.
    
      🔍 На третьей неделе вы уже искали живые точки: что не всё равно, что хочется сохранить, какие ценности
      звучат. Теперь важно сделать маленькое действие не просто ради действия, а в сторону одной из этих опор.
    
      🌱 Смысл возвращается не только через размышление. Он укрепляется, когда человек делает хотя бы что-то
      маленькое в сторону важного.
    
      🎯 Сегодня не нужно доказывать себе силу. Нужно выбрать один небольшой шаг, который говорит: "это для
      меня важно, и я могу сделать к этому маленькое движение".'
    task:
      text: '🧭 Выберите одну важную для вас тему или ценность.
      
        🔍 Ответьте:
      
        🔸 Что для меня сейчас важно?
      
        🔸 Какое маленькое действие может поддержать это важное?
      
        🔸 Что я могу сделать сегодня в минимальном объёме?
      
        🔸 Как понять, что этот шаг действительно связан с важным?
      
        💡 Примеры маленьких действий: написать человеку; выделить 10 минут на здоровье; открыть старую идею
        или проект; сделать один небольшой порядок; прочитать или посмотреть что-то по важной теме; прогуляться;
        сделать паузу и не перегружать себя; записать одну мысль о будущем.
      
      
        Кнопочные варианты:
      
        🔸 Шаг в сторону близости
      
        🔸 Шаг в сторону здоровья
      
        🔸 Шаг в сторону свободы
      
        🔸 Шаг в сторону развития
      
        🔸 Шаг в сторону дела
      
        🔸 Шаг в сторону отдыха
      
        🔸 Шаг в сторону внутренней честности
      
        🔸 Пока сложно выбрать'
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам выбрать или сделать один шаг в сторону важного?
      options:
      - Да, сделал
      - Да, выбрал, но пока не сделал
      - Частично
      - Не получилось
      - Я не выполнял задание
      correct: null
      saves_free_text: false
    reflection:
    - Какое важное я сегодня поддержал?
    - Какой шаг я сделал или выбрал?
    - Что изменилось внутри, даже если совсем немного?
  - d: 3
    title: Действие без полной уверенности
    focus: '🔍 Сегодня важно заметить: для маленького действия не нужна полная уверенность.
    
      ⏳ Часто человек ждёт, когда появится ясность, энергия, мотивация, уверенность, правильное настроение
      или точный план. Но в реальной жизни движение часто начинается раньше, чем приходит уверенность.
    
      🌱 Иногда уверенность появляется не до действия, а после нескольких маленьких шагов.
    
      💭 Сегодня мы смотрим на страх неудачи: "а вдруг не получится?", "а вдруг я ошибусь?", "а вдруг я снова
      разочаруюсь?". Эти мысли могут быть понятными, но они не обязаны полностью останавливать движение.'
    task:
      text: '🧭 Выберите одно небольшое действие, которое вы откладываете из-за сомнений.
      
        🔍 Ответьте:
      
        🔸 Какой уверенности я жду?
      
        🔸 Что я боюсь сделать не так?
      
        🔸 Чего я боюсь, если не получится?
      
        🔸 Можно ли сделать это в минимальном, безопасном объёме?
      
        🔸 Какой шаг возможен даже с сомнением?
      
      
        Кнопочные варианты:
      
        🔸 Я жду ясности
      
        🔸 Я жду уверенности
      
        🔸 Я жду энергии
      
        🔸 Я жду подходящего настроения
      
        🔸 Я жду идеального плана
      
        🔸 Я боюсь сделать неправильно
      
        🔸 Я могу сделать маленький шаг с сомнением
      
        🔸 Пока сложно'
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам сегодня допустить действие без полной уверенности?
      options:
      - Да, получилось
      - Да, частично
      - Я понял идею, но пока не сделал
      - Не получилось
      - Я не выполнял задание
      correct: null
      saves_free_text: false
    reflection:
    - Какой уверенности я ждал?
    - Что было возможно даже без неё?
    - Что я понял о действии с сомнением?
  - d: 4
    title: Что я боюсь получить, если начну двигаться
    focus: '🔍 Сегодня мы смотрим на более скрытую тему: иногда человек боится не только провала, но и того,
      что движение действительно начнётся.
    
      💭 Хороший результат тоже может вызывать напряжение. Если у меня получится, что изменится? Что я получу
      вместе с этим? Больше ответственности? Больше внимания? Больше ожиданий? Необходимость продолжать? Риск
      стать заметнее? Необходимость признать, что я могу?
    
      🕊️ Иногда человек бессознательно остаётся в паузе, потому что пауза привычна. Она может быть тяжёлой,
      но знакомой. А движение несёт новое, и поэтому может пугать.
    
      🔍 Сегодня задача — не обвинять себя в этом, а честно заметить: что я боюсь получить, если начну двигаться?'
    task:
      text: '🧭 Выберите одно направление, где вы хотели бы сдвинуться с места.
      
        🔍 Ответьте:
      
        🔸 Что может измениться, если я начну двигаться?
      
        🔸 Что хорошего может оказаться для меня непривычным?
      
        🔸 Что я боюсь получить вместе с результатом?
      
        🔸 Какая новая ответственность может появиться?
      
        🔸 Что мне придётся признать о себе, если у меня начнёт получаться?
      
      
        Кнопочные варианты:
      
        🔸 Я боюсь большей ответственности
      
        🔸 Я боюсь стать заметнее
      
        🔸 Я боюсь ожиданий других людей
      
        🔸 Я боюсь, что придётся продолжать
      
        🔸 Я боюсь изменить привычную роль
      
        🔸 Я боюсь, что отношения изменятся
      
        🔸 Я боюсь признать, что могу больше
      
        🔸 Пока сложно понять'
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам сегодня заметить, что хороший результат тоже может
        вызывать напряжение?
      options:
      - Да, чётко заметил
      - Да, частично
      - Есть слабое понимание
      - Пока сложно
      - Я не выполнял задание
      correct: null
      saves_free_text: false
    reflection:
    - Что я боюсь получить, если начну двигаться?
    - Какая часть хорошего результата вызывает напряжение?
    - Что я могу признать без самокритики?
  - d: 5
    title: Что изменится, если у меня получится
    focus: '🌊 Сегодня мы продолжаем тему хорошего результата.
    
      💭 Иногда человек говорит: "я хочу, чтобы получилось", но внутри одновременно появляется напряжение.
      Потому что если получится, придётся жить уже не совсем по-старому.
    
      🔄 Может измениться самоощущение. Может измениться роль в семье, отношениях, работе. Может появиться
      больше свободы, а вместе с ней — больше выбора. Может стать меньше привычных оправданий. Может появиться
      новый уровень ответственности.
    
      🔍 Сегодня задача — мягко представить: что изменится, если у меня получится? И где в этом месте появляется
      напряжение?'
    task:
      text: '💭 Представьте, что один маленький шаг начал давать результат.
      
        🔍 Ответьте:
      
        🔸 Что изменится в моей жизни, если у меня получится?
      
        🔸 Как изменится моё отношение к себе?
      
        🔸 Как могут измениться ожидания других людей?
      
        🔸 Что я уже не смогу говорить о себе по-старому?
      
        🔸 Какую новую роль мне придётся принять?
      
        🔸 Что в этом хорошем результате вызывает страх или напряжение?
      
      
        Кнопочные варианты:
      
        🔸 Мне придётся признать свою силу
      
        🔸 Мне придётся стать заметнее
      
        🔸 Мне придётся брать больше ответственности
      
        🔸 Мне придётся продолжать движение
      
        🔸 Мне придётся выйти из старой роли
      
        🔸 Мне придётся по-другому строить отношения
      
        🔸 Мне придётся перестать говорить "я не могу"
      
        🔸 Пока сложно представить'
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам сегодня заметить, что может измениться, если у вас
        получится?
      options:
      - Да, стало понятнее
      - Да, частично
      - Есть первые мысли
      - Пока сложно
      - Я не выполнял задание
      correct: null
      saves_free_text: false
    reflection:
    - Что изменится, если у меня получится?
    - Какая новая роль может появиться?
    - Что в хорошем результате кажется непривычным?
  - d: 6
    title: Не откатываться, когда становится лучше
    focus: '🔍 Сегодня мы смотрим на самосаботаж без обвинения.
    
      🔄 Иногда, когда у человека появляется первое движение, он неожиданно откатывается назад. Откладывает,
      обесценивает, забывает, срывает ритм, возвращается к старой роли или говорит себе: "это всё равно ничего
      не значит".
    
      🕊️ Такой откат не всегда происходит из лени. Иногда он появляется потому, что улучшение тоже непривычно.
      Когда становится лучше, меняется внутренняя система координат. И часть человека может пытаться вернуть
      знакомое состояние, даже если оно было тяжёлым.
    
      🌱 Сегодня задача — заметить самосаботаж мягко, без вины, и выбрать не рывок, а маленькое продолжение.'
    task:
      text: '🔍 Вспомните, как вы обычно откатываетесь, когда появляется движение.
      
        🔍 Ответьте:
      
        🔸 Что я делаю, когда становится чуть лучше?
      
        🔸 Как я могу обесценить свой шаг?
      
        🔸 Где я возвращаюсь в старую роль или старую паузу?
      
        🔸 Чего я могу бояться в продолжении движения?
      
        🔸 Какой маленький следующий шаг поможет не откатиться полностью?
      
      
        Кнопочные варианты:
      
        🔸 Я обесцениваю результат
      
        🔸 Я откладываю следующий шаг
      
        🔸 Я резко перегружаю себя и потом бросаю
      
        🔸 Я возвращаюсь к старой роли
      
        🔸 Я начинаю сомневаться
      
        🔸 Я жду, что всё снова станет плохо
      
        🔸 Я могу выбрать маленькое продолжение
      
        🔸 Пока сложно понять'
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам сегодня заметить свой способ отката или самосаботажа?
      options:
