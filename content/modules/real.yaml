    title: Что удерживает меня на месте
    focus: '🔍 Сегодня важно начать с простого вопроса: "Что меня удерживает?"
    
      🚧 Когда человек не двигается, он часто объясняет это слабостью, ленью или отсутствием силы воли. Но
      за остановкой почти всегда есть причина. Иногда это усталость. Иногда страх. Иногда разочарование. Иногда
      ощущение, что любые усилия всё равно ничего не изменят.
    
      🕊️ Задача дня — не обвинять себя, а начать видеть, что именно создаёт внутреннюю остановку.'
