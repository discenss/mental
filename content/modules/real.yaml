weeks:
- n: 1
  title: Понять свою паузу
  intro_screen: '🌊 На этой неделе вы начнёте мягко разбираться с тем, что с вами происходит сейчас.
  
    🔍 Иногда человек не сразу понимает, что именно изменилось. Вроде бы жизнь продолжается: есть дела, обязанности,
    привычные маршруты, разговоры, задачи. Но внутри может появляться ощущение паузы: как будто что-то остановилось,
    потеряло вкус, стало менее живым или перестало откликаться.
  
    🧭 Главная задача этой недели — не искать срочно новый смысл и не заставлять себя "собраться". Сначала
    важно спокойно увидеть: где вы сейчас находитесь, что стало автоматическим, что перестало радовать,
    где вы перестали выбирать и что внутри просит внимания.
  
    🗺️ К концу недели у вас появится первая карта вашей внутренней паузы. Вы лучше поймёте не "что со мной
    не так", а что именно сейчас требует осмысления, бережности и нового взгляда.'
  meaning: '🌿 На первой неделе пользователь не должен сразу искать предназначение, ставить большие цели
    или резко менять жизнь. Главная задача — помочь ему заметить состояние внутренней остановки: где жизнь
    стала автоматической, где пропал контакт с собой, где снизился интерес, где появилось ощущение пустоты,
    усталости, неопределённости или "я как будто не там".
  
    🔍 Неделя работает как диагностическая и наблюдательная. Пользователь собирает первые наблюдения о своём
    состоянии без самокритики и без давления.'
  goal: '🎯 Перевести смутное ощущение "со мной что-то не так" в более ясное понимание: "я сейчас в паузе,
    и я могу начать её исследовать".'
  result: '🗺️ К концу недели у пользователя появляется первая карта внутренней паузы: он лучше понимает,
    где в жизни остановка, что потеряло вкус, что делается на автомате и где исчез выбор.'
  key_themes:
  - внутренняя пауза
  - автоматизм
  - потеря вкуса
  - где перестал выбирать
  - наблюдение без самокритики
  days:
  - d: 1
    title: Что со мной происходит
    focus: '🌿 Сегодня важно не требовать от себя быстрых ответов. Если внутри есть усталость, пустота, потеря
      интереса или ощущение, что жизнь стала менее живой — это не значит, что с вами что-то не так.
    
      🌊 Иногда человек попадает во внутреннюю паузу. Это состояние, где старые способы жить уже не дают прежнего
      отклика, а новые ещё не появились.
    
      🔍 Сегодня задача — просто начать замечать, что именно происходит.'
    task:
      text: '❓ Что я сейчас чаще всего чувствую по отношению к своей жизни?
      
        ❓ Где я ощущаю внутреннюю остановку?
      
        ❓ Какая фраза лучше всего описывает моё состояние сейчас?
      
      
        Варианты для выбора:
      
        🔸 Я устал и не понимаю, куда двигаться
      
        🔸 Я многое делаю автоматически
      
        🔸 Мне стало меньше интересно то, что раньше было важным
      
        🔸 Я чувствую пустоту или потерю смысла
      
        🔸 Я будто живу не своей жизнью
      
        🔸 Я пока не могу точно описать состояние'
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам сегодня хотя бы немного заметить своё текущее состояние?
      options:
      - Да, стало понятнее
      - Частично, появились первые мысли
      - Пока сложно сформулировать
      - Не получилось
      - Я не выполнял задание
      correct: null
      saves_free_text: false
    reflection:
    - Что сегодня лучше всего описывает моё состояние?
    - Где я заметил ощущение внутренней паузы?
    - Что я могу сказать себе без критики?
  - d: 2
    title: Где я сейчас в жизни
    focus: '🗺️ Сегодня задача — посмотреть на свою жизнь не как на проблему, а как на карту. Иногда человек
      теряет ощущение направления, потому что долго живёт в режиме обязанностей, реакции на обстоятельства
      или выживания.
    
      🔍 Важно спокойно увидеть: в какой точке я сейчас нахожусь? Не где "надо быть", не где "должен был быть",
      а где я реально сейчас.'
    task:
      text: '🔍 Отметьте основные зоны своей жизни: работа / дело; отношения; тело / здоровье; деньги / безопасность;
        самореализация; отдых / удовольствие; внутреннее состояние.
      
        🧭 Выберите 1–2 зоны, где сильнее всего ощущается пауза, пустота или потеря ясности.
      
      
        Варианты для выбора:
      
        🔸 Работа / дело
      
        🔸 Отношения
      
        🔸 Тело / здоровье
      
        🔸 Деньги / безопасность
      
        🔸 Самореализация
      
        🔸 Отдых / удовольствие
      
        🔸 Внутреннее состояние
      
        🔸 Пока не понимаю'
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам увидеть, в какой зоне жизни сейчас больше всего паузы?
      options:
      - Да, чётко увидел
      - Да, примерно понял
      - Есть несколько зон
      - Пока сложно понять
      - Я не выполнял задание
      correct: null
      saves_free_text: false
    reflection:
    - Какая зона жизни сейчас больше всего требует внимания?
    - Что в этой зоне стало менее живым?
    - Что я понял о своей текущей точке?
  - d: 3
    title: Что потеряло вкус
    focus: '🔍 Сегодня вы будете замечать не только то, что болит, но и то, что перестало откликаться. Иногда
      смысл уходит не резко. Он может исчезать постепенно: из привычных дел, общения, работы, целей, отдыха.
    
      🌾 Задача дня — заметить, что раньше давало чувство жизни, интереса или включённости, а сейчас стало
      пустым, тяжёлым или автоматическим.'
    task:
      text: '💭 Вспомните 2–3 вещи, которые раньше давали вам интерес, радость, ощущение смысла или движения.
      
        🔸 Что раньше имело вкус?
      
        🔸 Что сейчас стало нейтральным, тяжёлым или пустым?
      
        🔸 Это исчезло полностью или просто стало слабее?
      
      
        Варианты для выбора:
      
        🔸 Работа перестала вдохновлять
      
        🔸 Отдых не восстанавливает
      
        🔸 Общение стало утомлять
      
        🔸 Цели больше не цепляют
      
        🔸 Привычные радости стали слабее
      
        🔸 Я давно ничего не жду с интересом
      
        🔸 Пока не могу понять'
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам заметить, что в жизни потеряло вкус?
      options:
      - Да, чётко заметил
      - Да, частично
      - Есть ощущение, но сложно назвать
      - Не получилось
      - Я не выполнял задание
      correct: null
      saves_free_text: false
    reflection:
    - Что раньше было живым, а сейчас стало пустым или слабым?
    - Что я почувствовал, когда это заметил?
    - Что из этого я не хочу пока терять окончательно?
  - d: 4
    title: Что я делаю на автомате
    focus: '🔍 Сегодня важно заметить автоматизм. Когда человек долго находится в напряжении, усталости или
      внутреннем кризисе, он может продолжать жить по инерции: делать нужное, отвечать, работать, выполнять
      обязанности, но почти не чувствовать себя внутри этого процесса.
    
      ⚙️ Автоматизм не плохой. Иногда он помогает выжить и держаться. Но если вся жизнь становится автоматической,
      человек теряет контакт с собой.'
    task:
      text: '🔍 Отметьте 1–3 действия, которые вы чаще всего делаете на автомате.
      
        🔸 Что я делаю, почти не присутствуя внутри?
      
        🔸 Где я просто выполняю роль?
      
        🔸 В какой момент дня я чаще всего теряю контакт с собой?
      
      
        Варианты для выбора:
      
        🔸 Работаю на автомате
      
        🔸 Общаюсь на автомате
      
        🔸 Забочусь о других на автомате
      
        🔸 Отдыхаю на автомате
      
        🔸 Просыпаюсь и сразу вхожу в режим дел
      
        🔸 Вечером просто "выключаюсь"
      
        🔸 Пока не замечаю'
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам сегодня заметить автоматическое действие?
      options:
      - Да, чётко заметил
      - Да, частично
      - Понял только вечером
      - Не получилось
      - Я не выполнял задание
      correct: null
      saves_free_text: false
    reflection:
    - Что сегодня я делал на автомате?
    - Где я меньше всего чувствовал себя живым?
    - В какой момент я мог бы вернуть хотя бы немного присутствия?
  - d: 5
    title: Где я перестал выбирать
    focus: '🔍 Сегодня задача — заметить, где в жизни стало меньше выбора. Иногда человек не чувствует смысла
      не потому, что смысла нет, а потому что слишком долго живёт в режиме "надо", "должен", "так сложилось",
      "у меня нет вариантов".
    
      🧭 Когда выбор исчезает, жизнь начинает ощущаться как коридор. Сегодня мы не ищем большие решения. Мы
      просто замечаем, где выбор стал незаметным.'
    task:
      text: '🧭 Выберите одну ситуацию, где вы часто говорите себе: "я должен", "у меня нет выбора", "так надо",
        "поздно что-то менять", "я не могу иначе".
      
        🔸 Это точно полное отсутствие выбора?
      
        🔸 Или выбор есть, но он кажется трудным?
      
        🔸 Какой самый маленький выбор всё-таки возможен?
      
      
        Варианты для выбора:
      
        🔸 Я перестал выбирать в работе
      
        🔸 Я перестал выбирать в отношениях
      
        🔸 Я перестал выбирать в отдыхе
      
        🔸 Я перестал выбирать в отношении к себе
      
        🔸 Я живу в режиме обязанностей
      
        🔸 Я пока не вижу, где есть выбор'
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам заметить зону, где вы перестали выбирать?
      options:
      - Да, чётко заметил
      - Да, частично
      - Пока это вызывает сопротивление
      - Не получилось
      - Я не выполнял задание
      correct: null
      saves_free_text: false
    reflection:
    - Где сегодня я жил из "надо", а не из выбора?
    - Какой маленький выбор был возможен?
    - Что я почувствовал, когда подумал о выборе?
  - d: 6
    title: Моя внутренняя пауза
    focus: '🧩 Сегодня вы собираете наблюдения недели в одну картину. Внутренняя пауза может быть разной:
      у кого-то это усталость, у кого-то потеря смысла, у кого-то ощущение тупика, у кого-то — жизнь по инерции.
    
      🌿 Важно не ставить себе диагноз и не критиковать себя. Важно понять форму своей паузы: как она проявляется
      именно у вас.'
    task:
      text: '🗺️ Соберите свою первую карту внутренней паузы:
      
        🔸 Где в жизни я чувствую остановку?
      
        🔸 Что потеряло вкус?
      
        🔸 Что я делаю на автомате?
      
        🔸 Где я перестал выбирать?
      
        🔸 Что внутри меня просит внимания?
      
      
        Варианты для выбора:
      
        🔸 Моя пауза больше про усталость
      
        🔸 Моя пауза больше про потерю смысла
      
        🔸 Моя пауза больше про автоматизм
      
        🔸 Моя пауза больше про отсутствие выбора
      
        🔸 Моя пауза больше про внутреннюю пустоту
      
        🔸 Я пока не могу определить'
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам увидеть форму своей внутренней паузы?
      options:
      - Да, стало понятнее
      - Частично
      - Есть первые наблюдения
      - Пока сложно
      - Я не выполнял задание
      correct: null
      saves_free_text: false
    reflection:
    - Как я сейчас понимаю свою внутреннюю паузу?
    - Что в ней самое важное?
    - Что я могу признать без давления на себя?
  - d: 7
    title: 'Итог недели: что я понял о своей остановке'
    focus: '🧭 Сегодня важно подвести итог без жёсткой оценки. Задача недели была не в том, чтобы сразу найти
      новый смысл, а в том, чтобы перестать убегать от вопроса "что со мной происходит?".
    
      🌱 Если вы начали лучше понимать свою паузу — это уже движение. Не резкий рывок, не новая большая цель,
      а первое честное приближение к себе.'
    task:
      text: '❓ Что я понял о своём текущем состоянии?
      
        ❓ Где в моей жизни больше всего паузы?
      
        ❓ Что потеряло вкус?
      
        ❓ Где я живу на автомате?
      
        ❓ Где я перестал выбирать?
      
        ❓ Какой один вывод я беру во вторую неделю?
      
      
        Варианты для выбора:
      
        🔸 Я начал лучше понимать своё состояние
      
        🔸 Я увидел, где потерял контакт с собой
      
        🔸 Я понял, что многое делаю автоматически
      
        🔸 Я заметил зону, где перестал выбирать
      
        🔸 Я пока не понял, но начал замечать
      
        🔸 Мне было сложно проходить неделю'
      subtasks: []
    quiz:
      kind: progress
      question: Удалось ли вам подвести итог первой недели?
      options:
      - Да, я сделал выводы
      - Частично
      - Пока сложно сформулировать
      - Не получилось
      - Я не проходил неделю регулярно
      correct: null
      saves_free_text: false
    reflection:
    - Какой главный вывод я делаю после первой недели?
    - Что я стал замечать яснее?
    - С каким пониманием я перехожу во вторую неделю?
