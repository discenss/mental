- n: 2
  title: Вернуть контакт с собой
  intro_screen: '🔙 На прошлой неделе вы начали замечать свою внутреннюю паузу: где жизнь стала автоматической,
    что потеряло вкус, где появилось ощущение остановки или отдаления от себя.
  
    🌱 На этой неделе мы сделаем следующий мягкий шаг — начнём возвращать контакт с собой.
  
    🔍 Когда человек долго живёт в режиме обязанностей, усталости, ожиданий других людей или внутреннего
    напряжения, он может перестать слышать себя. Он вроде бы продолжает действовать, но хуже понимает, что
