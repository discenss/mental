  text: Я склонен сравнивать себя с другими и чувствовать, что со мной что-то не так.
- n: 18
  direction: SELF
  text: Мне трудно принимать похвалу, поддержку или собственные успехи спокойно.
- n: 19
  direction: REL
  text: В отношениях с людьми у меня часто повторяются похожие сложности.
- n: 20
  direction: REL
  text: Я могу бояться быть отвергнутым, потерять близость или оказаться ненужным.
- n: 21
  direction: REL
  text: Мне бывает трудно доверять, спокойно говорить о важном или выдерживать конфликт.
- n: 22
