intake:
  version: 1.0.0
  questions_count: 30
  reference_period: последние 2–4 недели
  client_intro: |-
    Ответьте на 30 коротких вопросов, чтобы система помогла определить, с какого маршрута вам лучше начать.
    Здесь нет правильных или неправильных ответов. Важно отвечать не так, как “должно быть”, а так, как вы действительно чувствуете и проживаете это сейчас.
    Ориентируйтесь на последние 2–4 недели.
    Результат не является диагнозом. Он нужен только для того, чтобы подобрать наиболее подходящую точку входа и не перегружать вас лишними заданиями.
  start_button: Подобрать мой маршрут
  answer_scale:
  - value: 0
    label: совсем не про меня
  - value: 1
    label: редко бывает
  - value: 2
    label: иногда бывает
  - value: 3
    label: часто про меня
  - value: 4
    label: почти всегда про меня
  direction_score:
    min: 0
    max: 12
    formula: сумма 3 вопросов направления
  thresholds:
  - min: 0
    max: 3
    meaning: Тема выражена слабо.
  - min: 4
    max: 6
    meaning: Тема присутствует как фоновая.
  - min: 7
    max: 9
    meaning: Тема значима и может влиять на состояние.
  - min: 10
    max: 12
    meaning: Тема является одной из ведущих и требует приоритетного внимания в маршруте.
  soft_threshold: 7
  soft_no_leading: У вас нет резко выраженной одной темы, но есть зоны, которые стоит исследовать внимательнее.
  tie_priority:
  - BURN
  - ANX
  - EMO
  - BOUND
  - SELF
  - REL
  - FOCUS
  - REAL
  - PAST
  - PROC
  no_show:
  - баллы и суммы по направлениям
  - техническую сортировку и пороги
  - формулировки “риск”, “патология”, “диагноз”, “нарушение”, “лечение”
  - фразы “вам срочно нужно”, “с вами проблема”, “диагностика показала”
  - слишком длинные объяснения по всем направлениям сразу
  must_include: Начать можно с рекомендованной программы — или выбрать другую, если она сейчас важнее для вас. Выбор всегда остаётся за вами.
