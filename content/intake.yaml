questions:
- n: 1
  direction: ANX
  text: Я часто чувствую внутреннее напряжение, даже если внешне всё относительно спокойно.
- n: 2
  direction: ANX
  text: Я склонен заранее прокручивать негативные варианты будущего.
- n: 3
  direction: ANX
  text: Мне трудно расслабиться, когда есть неопределённость или ощущение, что я не всё контролирую.
- n: 4
  direction: EMO
  text: Иногда эмоции накрывают меня сильнее, чем я могу выдержать спокойно.
- n: 5
  direction: EMO
  text: После переживаний, ссор или стресса мне трудно быстро вернуться в нормальное состояние.
- n: 6
  direction: EMO
  text: Бывает, что мои эмоции влияют на решения, слова или поступки сильнее, чем мне бы хотелось.
- n: 7
