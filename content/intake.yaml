interpretations:
  static:
    pre_result: |-
      Спасибо, что ответили на вопросы.
      По вашим ответам система определила тему, с которой сейчас логичнее всего начать. Это не диагноз и не оценка “хорошо” или “плохо”. Это способ понять, какая зона в данный момент сильнее всего влияет на ваше состояние, энергию, решения, отношения или внутреннее ощущение себя.
      Важно: если одновременно проявилось несколько тем, это нормально. Чаще всего состояние человека складывается не из одной причины, а из нескольких связанных процессов: напряжения, усталости, привычных реакций, внутреннего давления, сложностей в отношениях или потери опоры.
      Система предложит ведущий маршрут и два дополнительных фокуса. При этом выбор остаётся за вами: вы можете начать с рекомендованного маршрута или выбрать другой модуль, если чувствуете, что сейчас он для вас важнее.
      Мы рекомендуем начать с ведущего фокуса, потому что именно он, по вашим ответам, сейчас проявлен наиболее заметно. Но маршрут не будет строиться через давление, перегруз или требование срочно “исправить всё сразу”. Движение будет постепенным, посильным и в комфортном для вас темпе.
    result_template: |-
      Ваш ведущий маршрут: [ВЕДУЩИЙ МАРШРУТ].
      [Интерпретация ведущего маршрута.]
      Также система отметила дополнительные фокусы: [ДОПОЛНИТЕЛЬНЫЙ ФОКУС 1] и [ДОПОЛНИТЕЛЬНЫЙ ФОКУС 2].
      [Интерпретация дополнительного фокуса 1.]
      [Интерпретация дополнительного фокуса 2.]
      Это не означает, что все темы нужно проходить одновременно. Система рекомендует начать с ведущего маршрута, а дополнительные фокусы учитывать постепенно — без давления, перегруза и внутреннего требования решить всё сразу.
    outro: |-
      Важно: результат самооценки не говорит о том, что с вами “что-то не так”. Он показывает, какие темы сейчас сильнее откликаются в вашем состоянии и на что стоит обратить внимание в первую очередь.
      Если проявилось несколько направлений, это нормально. Часто нервная система, эмоции, отношения, усталость, привычные реакции и ощущение смысла связаны между собой. Поэтому мы не будем работать со всем сразу.
      Система рекомендует начать с ведущего маршрута, но право выбора остаётся за вами. Вы можете принять рекомендацию или выбрать тот модуль, который сейчас ощущается для вас наиболее актуальным.
      Главная задача — двигаться без давления на себя, без перегруза и без ощущения, что нужно срочно всё изменить. Маршрут будет выстроен постепенно: сначала основной фокус, затем — мягкое внимание к дополнительным темам, если они будут важны для вашего движения.
      Достаточно идти шаг за шагом, в своём темпе. Это уже начало работы с собой.
  leading:
    ANX: |-
      Ваш ведущий маршрут — Тревога и внутреннее напряжение.
      Сейчас наиболее выраженной темой у вас проявляется тревога и внутреннее напряжение.
      Это может означать, что нервная система часто находится в режиме ожидания угрозы, контроля или внутренней мобилизации. В таком состоянии человеку бывает трудно расслабиться, спокойно смотреть в будущее и выдерживать неопределённость.
      Система рекомендует начать с этого маршрута, потому что снижение тревожного напряжения часто становится первой опорой для дальнейшей работы. Когда нервная система становится спокойнее, легче принимать решения, восстанавливать сон, энергию и контакт с собой.
      Вы можете выбрать другой маршрут для старта, если чувствуете, что сейчас для вас он важнее. Но по результатам самооценки система рекомендует начать именно с этого фокуса как с наиболее логичной и бережной точки входа.
    EMO: |-
      Ваш ведущий маршрут — Эмоциональная регуляция.
      Сейчас ведущей темой у вас проявляется эмоциональная регуляция.
      Это может означать, что переживания иногда становятся слишком интенсивными, долго не отпускают или начинают влиять на решения, слова и поведение. В таком состоянии человек может уставать не только от событий, но и от силы собственных эмоциональных реакций.
      Система рекомендует начать с этого маршрута, потому что умение распознавать, выдерживать и постепенно регулировать эмоции создаёт базовую устойчивость. Это помогает не подавлять чувства, но и не позволять им полностью управлять состоянием.
      Вы можете выбрать другой маршрут для старта, если чувствуете, что сейчас для вас он важнее. Но по результатам самооценки система рекомендует начать именно с этого фокуса как с наиболее логичной и бережной точки входа.
    PAST: |-
      Ваш ведущий маршрут — Прошлый опыт и его влияние на настоящее.
      Сейчас ведущей темой у вас проявляется влияние прошлого опыта.
      Это может означать, что некоторые события, воспоминания или прежние жизненные сценарии до сих пор откликаются в настоящем. Иногда человек реагирует не только на текущую ситуацию, но и на то, что уже когда-то было болезненным или незавершённым.
      Система рекомендует начать с этого маршрута, если прошлый опыт заметно влияет на ваши реакции, отношения, самоощущение или выборы. Работа будет строиться бережно: не через давление и повторное погружение в боль, а через постепенное понимание, завершение и возвращение опоры в настоящем.
      Вы можете выбрать другой маршрут для старта, если чувствуете, что сейчас для вас он важнее. Но по результатам самооценки система рекомендует начать именно с этого фокуса как с наиболее логичной и бережной точки входа.
    BURN: |-
      Ваш ведущий маршрут — Выгорание и восстановление энергии.
      Сейчас наиболее выраженной темой у вас проявляется выгорание и истощение.
      Это может означать, что ваша система долгое время находилась в режиме нагрузки, ответственности или внутреннего напряжения. В таком состоянии снижается энергия, пропадает интерес, появляется усталость даже от обычных дел, а отдых может не давать полноценного восстановления.
      Система рекомендует начать именно с этого маршрута, потому что при истощении важно сначала вернуть ресурс, а не требовать от себя резких изменений. Главная задача — постепенно восстановить силы, внутренний темп и ощущение, что вы снова можете опираться на себя.
      Вы можете выбрать другой маршрут для старта, если чувствуете, что сейчас для вас он важнее. Но по результатам самооценки система рекомендует начать именно с этого фокуса как с наиболее логичной и бережной точки входа.
    FOCUS: |-
      Ваш ведущий маршрут — Фокус, действия и выход из прокрастинации.
      Сейчас ведущей темой у вас проявляется фокус, прокрастинация и трудность доводить важное до результата.
      Это может означать, что вам бывает сложно начать, удерживать внимание, справляться с хаосом задач или действовать без внутреннего давления. Часто за прокрастинацией стоит не отсутствие желания, а тревога, страх ошибки, перегруз или перфекционизм.
      Система рекомендует начать с этого маршрута, потому что он помогает вернуть управляемость действиям: не через жёсткую дисциплину, а через понятные шаги, снижение внутреннего сопротивления и более спокойный контакт с задачами.
      Вы можете выбрать другой маршрут для старта, если чувствуете, что сейчас для вас он важнее. Но по результатам самооценки система рекомендует начать именно с этого фокуса как с наиболее логичной и бережной точки входа.
    SELF: |-
      Ваш ведущий маршрут — Самооценка и внутренний критик.
      Сейчас ведущей темой у вас проявляется самооценка и отношение к себе.
      Это может означать, что внутри часто включается критичный голос, сравнение с другими, страх ошибки или ощущение, что вы недостаточно хороши. Такое внутреннее давление может забирать много энергии и влиять на решения, отношения и способность поддерживать себя.
      Система рекомендует начать с этого маршрута, потому что работа с самоотношением помогает снизить внутреннюю жёсткость и вернуть более устойчивую опору на себя. Здесь важно не “стать идеальным”, а научиться быть с собой честнее, спокойнее и бережнее.
      Вы можете выбрать другой маршрут для старта, если чувствуете, что сейчас для вас он важнее. Но по результатам самооценки система рекомендует начать именно с этого фокуса как с наиболее логичной и бережной точки входа.
    REL: |-
      Ваш ведущий маршрут — Отношения и повторяющиеся сценарии.
      Сейчас ведущей темой у вас проявляются отношения и повторяющиеся сценарии с людьми.
