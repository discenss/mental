# Host-nginx конфиг для Mental Club (сабдомен на том же VPS, что rhythmos).
# Положить в /etc/nginx/sites-available/mental.rhythmos.online и слинковать в sites-enabled,
# затем `sudo certbot --nginx -d mental.rhythmos.online` (получит SSL и допишет 443-блок).
#
# Порты: backend 127.0.0.1:8010, bot-webhook 127.0.0.1:8011 (см. docker-compose.prod.yml).

server {
    listen 80;
    server_name mental.rhythmos.online;

    # Telegram webhook → контейнер бота
    location /tg/webhook {
        proxy_pass         http://127.0.0.1:8011;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API бэкенда (для будущих iOS / WhatsApp webhook / вебстраниц)
    location / {
        proxy_pass         http://127.0.0.1:8010;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
